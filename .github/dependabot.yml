version: 2

updates:
  - package-ecosystem: npm
    directory: /cli
    schedule:
      interval: weekly
      day: wednesday
    groups:
      production:
        dependency-type: production
      dev:
        dependency-type: development
    commit-message:
      prefix: 'chore(deps):'
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    commit-message:
      prefix: 'chore(ci):'
    labels:
      - ci
    open-pull-requests-limit: 3
